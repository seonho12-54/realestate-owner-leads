spring:
  application:
    name: downy-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/realestate_leads?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    time-zone: Asia/Seoul
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

app:
  base-url: ${APP_BASE_URL:http://localhost:5173}
  admin-session-secret: ${ADMIN_SESSION_SECRET:change-this-admin-secret}
  user-session-secret: ${USER_SESSION_SECRET:change-this-user-secret}
  session-duration-days: ${SESSION_DURATION_DAYS:14}
  cookie:
    same-site: ${APP_COOKIE_SAME_SITE:Lax}
    domain: ${APP_COOKIE_DOMAIN:}
    secure: ${APP_COOKIE_SECURE:#{null}}
  kakao-rest-api-key: ${KAKAO_REST_API_KEY:}
  kakao-js-key: ${KAKAO_JS_KEY:}
  max-photo-size-mb: ${MAX_PHOTO_SIZE_MB:20}
  max-photo-count: ${MAX_PHOTO_COUNT:10}
  s3:
    bucket: ${S3_BUCKET:}
    region: ${S3_REGION:ap-northeast-2}
    upload-prefix: ${S3_UPLOAD_PREFIX:leads}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:${FRONTEND_ORIGIN:http://localhost:5173}}
